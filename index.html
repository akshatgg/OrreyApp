<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Traveling the Orbits</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');

        body {
            margin: 0;
            background-color: #121212;
            color: #fff;
        }

        p {
            font-family: 'Space Mono', monospace;
        }

        #gui_container {
            position: absolute;
            top: 10%;
            right: 5%;
            scale: 130%;
            z-index: 100;
        }

        #gui {
            z-index: 100;
        }

        .nav {
            font-family: 'Space Mono', monospace;
            width: 100%;
            height: 65px;
            position: fixed;
            line-height: 65px;
            text-align: center;
            z-index: 100000;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .nav div.logo {
            float: left;
            width: auto;
            height: auto;
            padding-left: 3rem;
        }

        .nav div.logo a {
            text-decoration: none;
            color: #fff;
            font-size: 1.5rem;
        }

        .nav div.logo a:hover {
            color: #a9a9a9;
        }

        .nav div.chat-toggle {
            float: right;
            width: auto;
            height: auto;
            padding-right: 3rem;
        }

        .nav div.chat-toggle button {
            background: none;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Space Mono', monospace;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav div.chat-toggle button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .nav div.gravity-toggle {
            float: right;
            width: auto;
            height: auto;
            padding-right: 1.5rem;
            line-height: 65px;
        }

        .nav div.gravity-toggle button {
            background: none;
            border: 2px solid #00ced1;
            color: #00ced1;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav div.gravity-toggle button:hover {
            background-color: rgba(0, 206, 209, 0.2);
        }

        .nav div.gravity-toggle button.active {
            background: linear-gradient(135deg, rgba(0, 206, 209, 0.4), rgba(138, 43, 226, 0.4));
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 206, 209, 0.5);
        }

        #muteBtn.muted {
            border-color: #ff6b6b;
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }

        #gameCanvas {
            position: relative;
        }

        #insideText {
            position: absolute;
            left: 80%;
            top: 60%;
            color: #fff;
            font-size: xx-large;
        }

        .overlay {
            box-shadow: 0px 0px 1px 100vmax rgba(0, 0, 0, 0.5);
            color: pink;
        }

        .description {
            width: 25%;
            margin: 2%;
            margin-top: 5%;
            padding: 5px;
            background-color: rgba(0, 0, 0, 0.6);
            color: whitesmoke;
            position: absolute;
            font-family: 'Space Mono', monospace;
            text-align: justify;
        }

        #div2 {
            padding-left: 6%;
            padding-right: 6%;
        }

        #title_box {
            padding-left: 6%;
            padding-right: 6%;
            display: flex;
            justify-content: space-between;
        }

        .close {
            width: 32px;
            height: 32px;
            opacity: 0.3;
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
        }

        .close:hover {
            opacity: 1;
        }

        .close:before,
        .close:after {
            position: absolute;
            left: 15px;
            content: ' ';
            height: 33px;
            width: 2px;
            background-color: #fff;
        }

        .close:before {
            transform: rotate(45deg);
        }

        .close:after {
            transform: rotate(-45deg);
        }

        .targer {
            margin-top: 3px;
            margin-bottom: 3px;
            text-decoration: underline;
        }

        .cont {
            display: flex;
            align-items: center;
        }

        .cont span {
            margin-left: 10px;
            margin-right: 10px;
            visibility: hidden;
        }

        /* Chat Logo Styles */
        /* ─── CHAT LOGO (Floating Button) ─── */
        #chat-logo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #6e48d9, #1a1a40);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow:
                0 0 20px rgba(110, 72, 217, 0.4),
                0 0 60px rgba(110, 72, 217, 0.15),
                inset 0 0 12px rgba(255, 255, 255, 0.05);
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(140, 100, 255, 0.3);
        }

        #chat-logo:hover {
            transform: scale(1.12);
            box-shadow:
                0 0 28px rgba(110, 72, 217, 0.6),
                0 0 80px rgba(110, 72, 217, 0.2),
                inset 0 0 12px rgba(255, 255, 255, 0.08);
            border-color: rgba(140, 100, 255, 0.5);
        }

        #chat-logo svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: rgba(255, 255, 255, 0.9);
            stroke-width: 1.8;
            filter: drop-shadow(0 0 4px rgba(140, 100, 255, 0.5));
        }

        /* ─── CHAT CONTAINER ─── */
        #chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 520px;
            background: linear-gradient(165deg, rgba(10, 10, 30, 0.92), rgba(15, 10, 40, 0.95));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 70, 200, 0.2);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(80, 50, 180, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            display: none;
            animation: slide-up 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        #chatbot-container.expanded {
            width: 80%;
            height: 80%;
            max-width: 900px;
            max-height: 700px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 20px rgba(110,72,217,0.4), 0 0 60px rgba(110,72,217,0.15), inset 0 0 12px rgba(255,255,255,0.05); }
            50%  { box-shadow: 0 0 28px rgba(110,72,217,0.55), 0 0 80px rgba(110,72,217,0.2), inset 0 0 12px rgba(255,255,255,0.08); }
            100% { box-shadow: 0 0 20px rgba(110,72,217,0.4), 0 0 60px rgba(110,72,217,0.15), inset 0 0 12px rgba(255,255,255,0.05); }
        }

        /* ─── CHAT HEADER ─── */
        #chat-header {
            padding: 14px 18px;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(100, 70, 200, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(60, 30, 140, 0.5), rgba(20, 10, 60, 0.6));
            backdrop-filter: blur(8px);
        }

        #chat-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #chat-header span::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
            display: inline-block;
        }

        #chat-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #expand-chat,
        #close-chat {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            transition: all 0.2s ease;
            position: relative;
        }

        #expand-chat:hover,
        #close-chat:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(140, 100, 255, 0.3);
        }

        #expand-chat svg {
            width: 14px;
            height: 14px;
        }

        #close-chat::before,
        #close-chat::after {
            position: absolute;
            content: '';
            height: 14px;
            width: 1.5px;
            background-color: currentColor;
            left: 50%;
            top: 50%;
        }

        #close-chat::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        #close-chat::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        /* ─── MESSAGES AREA ─── */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 70, 200, 0.3) transparent;
        }

        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(100, 70, 200, 0.3);
            border-radius: 4px;
        }

        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 70, 200, 0.5);
        }

        .message {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 14px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            word-wrap: break-word;
            line-height: 1.55;
            letter-spacing: 0.2px;
            animation: msg-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #6e48d9, #8b5cf6);
            border-bottom-right-radius: 4px;
            color: #fff;
            box-shadow: 0 2px 12px rgba(110, 72, 217, 0.25);
        }

        .bot-message {
            align-self: flex-start;
            background: rgba(30, 25, 60, 0.7);
            border: 1px solid rgba(100, 70, 200, 0.12);
            border-bottom-left-radius: 4px;
            color: rgba(230, 225, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* ─── INPUT AREA ─── */
        #chat-input-container {
            padding: 12px 14px;
            border-top: 1px solid rgba(100, 70, 200, 0.12);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 8, 25, 0.5);
        }

        #chat-input {
            flex: 1;
            background: rgba(30, 25, 60, 0.5);
            border: 1px solid rgba(100, 70, 200, 0.15);
            color: rgba(230, 225, 255, 0.95);
            padding: 10px 16px;
            border-radius: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            transition: all 0.25s ease;
        }

        #chat-input::placeholder {
            color: rgba(160, 150, 200, 0.4);
        }

        #chat-input:focus {
            outline: none;
            border-color: rgba(110, 72, 217, 0.5);
            box-shadow: 0 0 0 3px rgba(110, 72, 217, 0.12);
            background: rgba(35, 30, 70, 0.6);
        }

        #send-button {
            background: linear-gradient(135deg, #6e48d9, #8b5cf6);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 2px 10px rgba(110, 72, 217, 0.3);
        }

        #send-button:hover {
            background: linear-gradient(135deg, #7c56e3, #9b6ff7);
            transform: scale(1.06);
            box-shadow: 0 4px 16px rgba(110, 72, 217, 0.4);
        }

        #send-button:active {
            transform: scale(0.97);
        }

        #send-button svg {
            width: 18px;
            height: 18px;
        }

        /* ─── TYPING INDICATOR ─── */
        .typing-indicator {
            display: flex;
            align-items: center;
            align-self: flex-start;
            background: rgba(30, 25, 60, 0.7);
            border: 1px solid rgba(100, 70, 200, 0.12);
            padding: 10px 16px;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            gap: 5px;
            animation: msg-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .typing-indicator span {
            height: 7px;
            width: 7px;
            background: rgba(140, 100, 255, 0.5);
            border-radius: 50%;
            display: inline-block;
        }

        .typing-indicator span:nth-child(1) { animation: bounce 1.2s infinite 0s; }
        .typing-indicator span:nth-child(2) { animation: bounce 1.2s infinite 0.15s; }
        .typing-indicator span:nth-child(3) { animation: bounce 1.2s infinite 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ─── PLANET HOVER TOOLTIP ─── */
        #planet-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            background: linear-gradient(165deg, rgba(12, 10, 35, 0.92), rgba(20, 15, 50, 0.95));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(100, 70, 200, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'Space Mono', monospace;
            color: rgba(230, 225, 255, 0.95);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(80, 50, 180, 0.1);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            max-width: 220px;
        }

        #planet-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #planet-tooltip .tooltip-name {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(100, 70, 200, 0.2);
            text-transform: uppercase;
        }

        #planet-tooltip .tooltip-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            padding: 2px 0;
            gap: 12px;
        }

        #planet-tooltip .tooltip-label {
            color: rgba(160, 150, 200, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #planet-tooltip .tooltip-value {
            color: rgba(200, 180, 255, 0.95);
            font-weight: 700;
        }

        #planet-tooltip .tooltip-type {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(100, 70, 200, 0.15);
            font-size: 0.62rem;
            color: rgba(140, 120, 220, 0.7);
            text-align: center;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="container">
            <div class="logo">
                <a href="#" onclick='document.getElementById("desc_box").hidden = ""'>Traveling the Orbits</a>
            </div>
            <div class="gravity-toggle">
                <button id="muteBtn" onclick="toggleMute()">Mute</button>
                <button id="gravityToggleBtn" onclick="toggleGravityField()">Gravity Field</button>
            </div>
        </div>
    </nav>

    <div id="gui_container"></div>
    
    <div id='gameCanvas'>
        <aside class="description" id="desc_box">
            <div id="title_box">
                <h2>DESCRIPTION</h2>
                <button class="close" onclick='this.parentNode.parentNode.hidden = "hidden"; return false;'>X</button>
            </div>

            <div id="div2">
                <div class="cont">
                    <h3 id="targetname" class="targer"></h3>
                    <span id="arrow">-></span>
                </div>
                <span id="typewriterText"></span>
            </div>
        </aside>
    </div>

    <!-- Planet Hover Tooltip -->
    <div id="planet-tooltip">
        <div class="tooltip-name"></div>
        <div class="tooltip-row"><span class="tooltip-label">Distance</span><span class="tooltip-value" id="tt-distance"></span></div>
        <div class="tooltip-row"><span class="tooltip-label">Orbit</span><span class="tooltip-value" id="tt-period"></span></div>
        <div class="tooltip-row"><span class="tooltip-label">Moons</span><span class="tooltip-value" id="tt-moons"></span></div>
        <div class="tooltip-type" id="tt-type"></div>
    </div>

    <!-- Chat Logo -->
    <div id="chat-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
            <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 3 0 3 0"></path>
            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-3 0-3"></path>
        </svg>
    </div>

    <!-- Chatbot Container -->
    <div id="chatbot-container">
        <div id="chat-header">
            <span>Cosmic Guide</span>
            <div id="chat-controls">
                <button id="expand-chat">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h6v6"></path>
                        <path d="M9 21H3v-6"></path>
                        <path d="M21 3l-7 7"></path>
                        <path d="M3 21l7-7"></path>
                    </svg>
                </button>
                <button id="close-chat"></button>
            </div>
        </div>
        <div id="chat-messages">
            <div class="message bot-message">
                Hello, space explorer! I'm Cosmic Guide, your orbital assistant. Ask me about planets, space missions, orbital mechanics, or how to use this simulator!
            </div>
        </div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Ask about planets, orbits, missions...">
            <button id="send-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ─── Mute toggle ───
        window.__isMuted = false;

        function toggleMute() {
            window.__isMuted = !window.__isMuted;
            var btn = document.getElementById('muteBtn');
            if (window.__isMuted) {
                btn.classList.add('muted');
                btn.textContent = 'Unmute';
                // Stop any currently playing speech
                window.speechSynthesis.cancel();
            } else {
                btn.classList.remove('muted');
                btn.textContent = 'Mute';
            }
        }

        // ─── Gravity field toggle ───
        function toggleGravityField() {
            var btn = document.getElementById('gravityToggleBtn');
            var isActive = btn.classList.toggle('active');
            if (window.__gravityField) {
                window.__gravityField.setVisible(isActive);
                window.__gravityControls.visible = isActive;
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
    <!-- Load space agent module — exposes sendToSpaceAgent globally for the chat -->
    <script type="module">
        import { sendToSpaceAgent } from './space-agent.js';
        window.__sendToSpaceAgent = sendToSpaceAgent;
    </script>
    <!-- Chat UI handlers in a regular script so they work even if the module/CDN is slow -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatContainer = document.getElementById('chatbot-container');
            const chatLogo = document.getElementById('chat-logo');
            const closeChatButton = document.getElementById('close-chat');
            const expandChatButton = document.getElementById('expand-chat');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendButton = document.getElementById('send-button');

            // Add pulse animation to chat logo
            setTimeout(function() {
                chatLogo.style.animation = "pulse 2s infinite";
            }, 3000);

            // Toggle chat visibility with logo
            chatLogo.addEventListener('click', function() {
                chatContainer.style.display = 'flex';
                chatInput.focus();
                chatLogo.style.display = 'none';
            });

            closeChatButton.addEventListener('click', function() {
                chatContainer.style.display = 'none';
                chatLogo.style.display = 'flex';
                chatContainer.classList.remove('expanded');
                updateExpandIcon();
            });

            expandChatButton.addEventListener('click', function() {
                chatContainer.classList.toggle('expanded');
                updateExpandIcon();
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });

            function updateExpandIcon() {
                if (chatContainer.classList.contains('expanded')) {
                    expandChatButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6"></path><path d="M20 10h-6V4"></path><path d="M14 10l7-7"></path><path d="M3 21l7-7"></path></svg>';
                } else {
                    expandChatButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>';
                }
            }

            function addMessage(content, isUser) {
                var messageDiv = document.createElement('div');
                messageDiv.className = isUser ? 'message user-message' : 'message bot-message';
                messageDiv.textContent = content;
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function showTypingIndicator() {
                var indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.id = 'typing-indicator';
                for (var i = 0; i < 3; i++) {
                    indicator.appendChild(document.createElement('span'));
                }
                chatMessages.appendChild(indicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeTypingIndicator() {
                var indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
            }

            function handleSendMessage() {
                var message = chatInput.value.trim();
                if (!message) return;
                addMessage(message, true);
                chatInput.value = '';

                if (!window.__sendToSpaceAgent) {
                    addMessage("AI assistant is still loading. Please try again in a moment.");
                    return;
                }

                showTypingIndicator();
                window.__sendToSpaceAgent(message).then(function(response) {
                    removeTypingIndicator();
                    addMessage(response);
                }).catch(function() {
                    removeTypingIndicator();
                    addMessage("Something went wrong. Please try again.");
                });
            }

            sendButton.addEventListener('click', handleSendMessage);

            chatInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') handleSendMessage();
            });
        });
    </script>
    <script>
        // Original typewriter and voice functions
        // Uses window.__twInterval so main.js can clear it too
        function typeWriter(text, speed) {
            const textElement = document.getElementById("typewriterText");
            if (!textElement) return;

            if (window.__twInterval) {
                clearInterval(window.__twInterval);
                window.__twInterval = null;
            }

            textElement.innerHTML = "";
            let i = 0;

            window.__twInterval = setInterval(() => {
                textElement.innerHTML += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(window.__twInterval);
                    window.__twInterval = null;
                }
            }, speed);
        }

        // Single shared speech function — cancel safely, then speak after engine resets
        let __speechTimer = null;
        function speakText(text) {
            // Skip speech entirely if muted
            if (window.__isMuted) return;

            const synth = window.speechSynthesis;

            // Cancel any running speech + pending speech timer
            if (__speechTimer) {
                clearTimeout(__speechTimer);
                __speechTimer = null;
            }
            synth.cancel();

            // Wait for engine to fully reset after cancel, then speak
            __speechTimer = setTimeout(() => {
                __speechTimer = null;
                const chunks = text.match(/[^.!?]+[.!?]+/g) || [text];
                const voices = synth.getVoices();
                const preferred = voices.find(v =>
                    v.name.includes('Samantha') ||
                    v.name.includes('Google UK English Female') ||
                    v.name.includes('Google US English') ||
                    v.name.includes('Karen') ||
                    v.name.includes('Daniel')
                );

                chunks.forEach(chunk => {
                    const utt = new SpeechSynthesisUtterance(chunk.trim());
                    utt.lang = 'en-US';
                    utt.rate = 0.95;
                    utt.pitch = 1.0;
                    utt.volume = 1.0;
                    if (preferred) utt.voice = preferred;
                    synth.speak(utt);
                });

                // Chrome workaround: keep synthesis alive with periodic resume
                const keepAlive = setInterval(() => {
                    if (!synth.speaking) {
                        clearInterval(keepAlive);
                    } else {
                        synth.resume();
                    }
                }, 5000);
            }, 300);
        }
        // Expose globally so main.js can use the same function
        window.__speakText = speakText;

        // Preload voices
        window.speechSynthesis.getVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        function Empty() {
            const textEle = document.getElementById("typewriterText");
            const targetNameEle = document.getElementById("targetname");
            const arrowEle = document.getElementById("arrow");

            if (!textEle || textEle.innerHTML.trim() === "") {
                const Intro = "Welcome to Traveling The Orbits! To start playing with the simulation, click on Galactic Travel, choose a preset (GA stands for Gravity Assist) or set up the satellite's initial parameters and then click launch. You can click and drag to adjust the camera along the focused element and use the mouse wheel to adjust zoom. During Galactic Travel, you can switch between focusing on the satellite or the Earth. Finally, you are able to change the parameters of time passing: choose a different time point or rather the time's passing velocity. You're all set, happy traveling!";
                speakText(Intro);
                typeWriter(Intro, 50);
            }

            if (targetNameEle && targetNameEle.innerHTML.trim() === "") {
                arrowEle.style.visibility = "hidden";
            } else {
                arrowEle.style.visibility = "visible";
            }
        }

        window.onload = function () {
            Empty();
            // Initialize chat container and logo
            document.getElementById('chatbot-container').style.display = 'none';
            document.getElementById('chat-logo').style.display = 'flex';
        };
    </script>
